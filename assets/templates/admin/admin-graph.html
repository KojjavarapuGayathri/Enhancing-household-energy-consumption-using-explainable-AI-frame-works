{% load static %}
<!doctype html>
<html class="no-js" lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Admin</title>
        <meta name="description" content="">
        <meta name="keywords" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="icon" href="{% static 'admin/favicon.ico' %}" type="image/x-icon" />
        <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:300,400,600,700,800" rel="stylesheet">
        
        <link rel="stylesheet" href="{% static 'admin/node_modules/bootstrap/dist/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static 'admin/node_modules/@fortawesome/fontawesome-free/css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'admin/node_modules/icon-kit/dist/css/iconkit.min.css' %}">
        <link rel="stylesheet" href="{% static 'admin/node_modules/ionicons/dist/css/ionicons.min.css' %}">
        <link rel="stylesheet" href="{% static 'admin/dist/css/theme.min.css' %}">
        <script src="{% static 'admin/src/js/vendor/modernizr-2.8.3.min.js' %}"></script>

        <style>
            .content-area {
                display: flex;
                justify-content: center;
                align-items: center;
                height: calc(100vh - 70px); /* Adjust for header height */
                padding: 20px;
                background-color: #f5f6fa;
            }
            .center-content {
                text-align: center;
                background: #fff;
                padding: 30px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                width: 80%;
            }
        </style>
    </head>

    <body>
        <div class="wrapper">
            <header class="header-top" header-theme="light">
                <div class="container-fluid">
                    <div class="d-flex justify-content-between">
                        <div class="top-menu d-flex align-items-center">
                            <button type="button" class="btn-icon mobile-nav-toggle d-lg-none"><span></span></button>
                            <button type="button" id="navbar-fullscreen" class="nav-link"><i class="ik ik-maximize"></i></button>
                        </div>
                        <div class="top-menu d-flex align-items-center">
                            <div class="dropdown">
                                <a class="dropdown-toggle" href="#" id="userDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <img class="avatar" src="{% static 'admin/img/fig1.jpg' %}" alt="">
                                </a>
                                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userDropdown">
                                    <a class="dropdown-item" href="{% url "user_index" %}"><i class="ik ik-power dropdown-icon"></i> Logout</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="page-wrap">
                <div class="app-sidebar colored">
                    <div class="sidebar-header">
                        <a class="header-brand" href="index.html">
                            <div class="logo-img">
                                <img src="{% static 'admin/img/fig2.jpg' %}" class="header-brand-img" style="height:100px;width:100px; padding-right:10px;" alt="lavalite"> 
                            </div>
                        </a>
                        <button type="button" class="nav-toggle"><i data-toggle="expanded" class="ik ik-toggle-right toggle-icon"></i></button>
                        <button id="sidebarClose" class="nav-close"><i class="ik ik-x"></i></button>
                    </div>
                    
                    <div class="sidebar-content">
                        <div class="nav-container">
                            <nav id="main-menu-navigation" class="navigation-main">
                                <div class="nav-lavel">Dashboard</div>
                                <div class="nav-item active">
                                    <a href="{% url 'admin_dashboard' %}"><i class="ik ik-bar-chart-2"></i><span>Dashboard</span></a>
                                </div>
                                <div class="nav-item has-sub">
                                    <a href="javascript:void(0)"><i class="ik ik-layers"></i><span>User Management</span></a>
                                    <div class="submenu-content">
                                        <a href="{% url 'pending_users' %}" class="menu-item">Pending users</a>
                                        <a href="{% url 'all_users' %}" class="menu-item">All Users</a>
                                    </div>
                                </div>
                                <div class="nav-item has-sub">
                                    <a href="#"><i class="ik ik-command"></i><span>Algorithm</span></a>
                                    <div class="submenu-content">
                                        <a href="{% url 'LGBMR' %}" class="menu-item">LGBMR Algorithm</a>
                                        <a href="{% url 'random' %}" class="menu-item">Random Forest Algorithm</a>
                                    </div>
                                </div>
                                <div class="nav-item active">
                                    <a href="{% url 'graph' %}"><i class="ik ik-bar-chart-2"></i><span>Graph</span></a>
                                </div>
                            </nav>
                        </div>
                    </div>
                </div>

                <!-- Centered Content Area -->
                <div class="content-area">
                    <div class="center-content">
                        <h1>Comparison of R² Scores</h1>
                        <img src="data:image/png;base64,{{ graph_image }}" alt="Graph" class="img-fluid">
                        <!-- <p>This graph compares the R² scores of various algorithms to visualize their performance.</p> -->
                    </div>
                </div>

                <footer class="footer">
                    <div class="w-100 clearfix">
                        <span class="text-center text-sm-left d-md-inline-block">Copyright © 2024 Codebook.in All Rights Reserved.</span>
                        <span class="float-none float-sm-right mt-1 mt-sm-0 text-center">Crafted with <i class="fa fa-heart text-danger"></i> by <a href="https://www.codebook.in/" class="text-dark" target="_blank">Codebook.in</a></span>
                    </div>
                </footer>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
        <script>window.jQuery || document.write('<script src="src/js/vendor/jquery-3.3.1.min.js"><\/script>')</script>
        <script src="{% static 'admin/node_modules/popper.js/dist/umd/popper.min.js' %}"></script>
        <script src="{% static 'admin/node_modules/bootstrap/dist/js/bootstrap.min.js' %}"></script>
        <script src="{% static 'admin/dist/js/theme.min.js' %}"></script>
    </body>
</html>
